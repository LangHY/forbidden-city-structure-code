<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jason Bergh - Creative Director</title>
    <script src="js/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Theme (Default) */
            --bg-color: #1a1a1a;
            --text-color: #f5e6d3;
            --text-secondary: #cccccc;
            --text-muted: #999999;
            --accent-color: #ff6b8b;
            --border-color: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(0, 0, 0, 0.6);
            --overlay-bg: rgba(0, 0, 0, 0.75);
            --film-strip-width: 30%;
            --film-strip-left: 35%;
            /* 清晰区域尺寸 - 3:2 比例（横向矩形） */
            --clear-height: 35vh;
            --clear-width: calc(var(--clear-height) * 1.5);
            --clear-left: var(--film-strip-left);
        }

        .light-theme {
            --bg-color: #f5f5f5;
            --text-color: #1a1a1a;
            --text-secondary: #555555;
            --text-muted: #888888;
            --accent-color: #e85a7a;
            --border-color: rgba(0, 0, 0, 0.1);
            --card-bg: rgba(255, 255, 255, 0.8);
            --overlay-bg: rgba(255, 255, 255, 0.75);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar {
            display: none;
        }

        html, body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* ========== Background Layer (Video - Clear) ========== */
        .background-layer {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }

        .background-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
        }

        /* ========== Blur Mask Layer (中间镂空) ========== */
        .blur-mask {
            position: fixed;
            inset: 0;
            z-index: 5;
            backdrop-filter: blur(4px) saturate(0.8);
            -webkit-backdrop-filter: blur(4px) saturate(0.8);
            pointer-events: none;
            /* 使用 mask 镂空中间区域 */
            -webkit-mask:
                linear-gradient(to right, black, black) left / var(--film-strip-left) 100% no-repeat,
                linear-gradient(to right, black, black) right / calc(100% - var(--film-strip-left) - var(--film-strip-width)) 100% no-repeat,
                linear-gradient(to bottom, black, black) top / 100% calc(50% - var(--clear-height) / 2) no-repeat,
                linear-gradient(to bottom, black, black) bottom / 100% calc(50% - var(--clear-height) / 2) no-repeat;
            mask:
                linear-gradient(to right, black, black) left / var(--film-strip-left) 100% no-repeat,
                linear-gradient(to right, black, black) right / calc(100% - var(--film-strip-left) - var(--film-strip-width)) 100% no-repeat,
                linear-gradient(to bottom, black, black) top / 100% calc(50% - var(--clear-height) / 2) no-repeat,
                linear-gradient(to bottom, black, black) bottom / 100% calc(50% - var(--clear-height) / 2) no-repeat;
        }

        .background-overlay {
            position: fixed;
            inset: 0;
            z-index: 6;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.15) 0%,
                rgba(0, 0, 0, 0.02) 50%,
                rgba(0, 0, 0, 0.15) 100%
            );
            pointer-events: none;
        }

        /* ========== Clear Area Highlight (矩形区域高亮遮罩) ========== */
        .clear-area-highlight {
            position: fixed;
            left: var(--film-strip-left);
            width: var(--film-strip-width);
            top: 50%;
            transform: translateY(-50%);
            height: var(--clear-height);
            z-index: 8;
            pointer-events: none;
            /* 圆角 */
            border-radius: 8px;
            /* 半透明边框 */
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            /* 取景器角落标记变量 */
            --corner-size: 24px;
            --corner-width: 2px;
        }

        /* 取景器角落标记 - 左上和右上 */
        .clear-area-highlight::before,
        .clear-area-highlight::after {
            content: '';
            position: absolute;
            width: var(--corner-size);
            height: var(--corner-size);
            border-color: rgba(255, 255, 255, 0.5);
            border-style: solid;
            border-width: 0;
        }

        .clear-area-highlight::before {
            top: 15px;
            left: 15px;
            border-top-width: var(--corner-width);
            border-left-width: var(--corner-width);
            border-top-left-radius: 4px;
        }

        .clear-area-highlight::after {
            top: 15px;
            right: 15px;
            border-top-width: var(--corner-width);
            border-right-width: var(--corner-width);
            border-top-right-radius: 4px;
        }

        /* 取景器角落标记 - 左下和右下（使用额外元素） */
        .viewfinder-corners {
            position: fixed;
            left: var(--film-strip-left);
            width: var(--film-strip-width);
            top: 50%;
            transform: translateY(-50%);
            height: var(--clear-height);
            z-index: 9;
            pointer-events: none;
            --corner-size: 24px;
            --corner-width: 2px;
        }

        .viewfinder-corners::before,
        .viewfinder-corners::after {
            content: '';
            position: absolute;
            width: var(--corner-size);
            height: var(--corner-size);
            border-color: rgba(255, 255, 255, 0.5);
            border-style: solid;
            border-width: 0;
        }

        .viewfinder-corners::before {
            bottom: 15px;
            left: 15px;
            border-bottom-width: var(--corner-width);
            border-left-width: var(--corner-width);
            border-bottom-left-radius: 4px;
        }

        .viewfinder-corners::after {
            bottom: 15px;
            right: 15px;
            border-bottom-width: var(--corner-width);
            border-right-width: var(--corner-width);
            border-bottom-right-radius: 4px;
        }

        /* 取景器中心十字准星 */
        .viewfinder-crosshair {
            position: fixed;
            left: var(--film-strip-left);
            width: var(--film-strip-width);
            top: 50%;
            transform: translateY(-50%);
            height: var(--clear-height);
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .viewfinder-crosshair::before {
            content: '+';
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0;
        }

        /* ========== Film Grain ========== */
        .film-grain {
            position: fixed;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.05;
            pointer-events: none;
            z-index: 100;
            animation: grain 0.3s steps(1) infinite;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -10%); }
            20% { transform: translate(-15%, 5%); }
            30% { transform: translate(7%, -25%); }
            40% { transform: translate(-5%, 25%); }
            50% { transform: translate(-15%, 10%); }
            60% { transform: translate(15%, 0%); }
            70% { transform: translate(0%, 15%); }
            80% { transform: translate(3%, 35%); }
            90% { transform: translate(-10%, 10%); }
        }

        /* ========== Film Strip (胶片区 - 时间码数字边界) ========== */
        .film-strip {
            position: fixed;
            left: var(--film-strip-left);
            width: var(--film-strip-width);
            top: 0;
            bottom: 0;
            z-index: 20;
            pointer-events: none;
        }

        /* 时间码数字样式 */
        .timecode {
            position: absolute;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            font-weight: 500;
            color: var(--text-color);
            opacity: 0.45;
            letter-spacing: 0.05em;
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        .timecode-left {
            left: 6px;
        }

        .timecode-right {
            right: 6px;
        }

        /* ========== Video Preview (视频预览框) ========== */
        .video-preview {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            width: calc(var(--film-strip-width) * 0.7);
            height: calc(var(--film-strip-width) * 0.7 * 0.667);
            z-index: 25;
            pointer-events: auto;
            cursor: pointer;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-preview:hover {
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateX(-50%) scale(1.02);
        }

        .video-preview-top {
            top: 20px;
        }

        .video-preview-bottom {
            bottom: 20px;
        }

        .video-preview video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        /* 黑色遮罩 */
        .video-preview::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-preview:hover::after {
            opacity: 0;
        }

        .video-preview-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        .video-preview:hover .video-preview-label {
            opacity: 0;
        }

        /* ========== Side Text Areas (两侧文字区域) ========== */
        .side-text {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: auto;
            pointer-events: none;
        }

        .side-text-left {
            left: 5%;
            width: 25%;
            text-align: right;
        }

        .side-text-right {
            right: 5%;
            width: 25%;
            text-align: left;
        }

        .side-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0.1em;
            color: var(--text-color);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .side-title.animate {
            opacity: 1;
            transform: translateY(0);
        }

        .side-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 0.75rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .side-subtitle.animate {
            opacity: 1;
            transform: translateY(0);
        }

        /* ========== Sidebar Controls ========== */
        .sidebar-controls {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 150;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s ease;
        }

        .control-btn svg {
            width: 18px;
            height: 18px;
            stroke: var(--text-color);
            transition: stroke 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 107, 139, 0.2);
            border-color: var(--accent-color);
        }

        .control-btn:hover svg {
            stroke: var(--accent-color);
        }

        .control-btn:focus {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }

        .control-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        .control-btn.active svg {
            stroke: #ffffff;
        }

        /* ========== Footer Bar ========== */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 200;
            padding: 1.5rem 5vw;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
        }

        .footer-left {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            pointer-events: auto;
        }

        .copyright {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .view-toggle {
            display: flex;
            gap: 0.5rem;
        }

        .toggle-option {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            transition: all 0.3s ease;
            background: transparent;
            border: none;
        }

        .toggle-option:hover {
            color: var(--text-color);
        }

        .toggle-option.active {
            color: var(--text-color);
            font-weight: 500;
        }

        .toggle-divider {
            color: var(--text-muted);
        }

        .footer-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.75rem;
            pointer-events: auto;
        }

        .filter-tags {
            display: flex;
            gap: 1rem;
        }

        .filter-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            cursor: pointer;
            padding: 0.25rem 0;
            background: transparent;
            border: none;
            transition: color 0.3s ease;
        }

        .filter-tag:hover {
            color: var(--text-color);
        }

        .filter-tag.active {
            color: var(--text-color);
            font-weight: 500;
        }

        .timecode {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .credits-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .credits-link:hover {
            color: var(--accent-color);
        }

        /* ========== Responsive Design ========== */
        @media (max-width: 1024px) {
            :root {
                --film-strip-width: 30%;
                --film-strip-left: 35%;
                --clear-height: 45vh;
            }

            .side-title {
                font-size: clamp(1.2rem, 2.5vw, 2rem);
            }

            .side-text-left {
                left: 3%;
                width: 28%;
            }

            .side-text-right {
                right: 3%;
                width: 28%;
            }
        }

        @media (max-width: 768px) {
            :root {
                --film-strip-width: 70%;
                --film-strip-left: 15%;
                --clear-height: 35vh;
            }

            .side-text {
                position: fixed;
                top: auto;
                bottom: 100px;
                transform: none;
                width: 100%;
                left: 0;
                right: 0;
                text-align: center;
                flex-direction: row;
                justify-content: center;
                gap: 2rem;
            }

            .side-text-left,
            .side-text-right {
                text-align: center;
                width: auto;
            }

            .side-title {
                font-size: clamp(1rem, 4vw, 1.5rem);
            }

            .side-subtitle {
                display: none;
            }

            .sidebar-controls {
                right: auto;
                left: 50%;
                top: auto;
                bottom: 20px;
                transform: translateX(-50%);
                flex-direction: row;
            }

            footer {
                padding: 1rem 4vw;
            }

            .footer-left,
            .footer-right {
                flex-direction: row;
                align-items: center;
                gap: 1rem;
            }

            .filter-tags {
                flex-wrap: wrap;
                justify-content: flex-end;
            }

            .timecode {
                display: none;
            }
        }

        /* ========== Focus Styles ========== */
        a:focus,
        button:focus {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }

        /* ========== 开屏帷幕动画 ========== */
        .curtain-left,
        .curtain-right {
            position: fixed;
            width: 50%;
            height: 100vh;
            top: 0;
            z-index: 10001;
            background-color: var(--bg-color);
            pointer-events: none;
        }

        .curtain-left {
            left: 0;
        }

        .curtain-right {
            right: 0;
        }

        /* ========== 开屏时间码瀑布动画 ========== */
        .intro-screen {
            position: fixed;
            inset: 0;
            z-index: 10002;
            background-color: #1a1a1a;
            pointer-events: none;
            perspective: 1000px;
        }

        .intro-timecode-left,
        .intro-timecode-right {
            position: absolute;
            width: 60px;
            height: 100%;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 20px;
            overflow: hidden;
        }

        .intro-timecode-left {
            left: calc(var(--film-strip-left) + 6px);
        }

        .intro-timecode-right {
            right: calc(100% - var(--film-strip-left) - var(--film-strip-width) + 6px);
        }

        .intro-timecode-left span,
        .intro-timecode-right span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            font-weight: 500;
            color: var(--text-color);
            opacity: 0.45;
            letter-spacing: 0.05em;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            margin-bottom: 20px;
        }

        .intro-text-left,
        .intro-text-right {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            transform-style: preserve-3d;
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0.1em;
            color: var(--text-color);
            opacity: 0;
        }

        .intro-text-left {
            left: 5%;
            width: 25%;
            text-align: right;
        }

        .intro-text-right {
            right: 5%;
            width: 25%;
            text-align: left;
        }

        /* ========== Viewfinder Click Area ========== */
        .viewfinder-click-area {
            position: fixed;
            left: var(--film-strip-left);
            width: var(--film-strip-width);
            top: 50%;
            transform: translateY(-50%);
            height: var(--clear-height);
            z-index: 15;
            cursor: pointer;
            pointer-events: auto;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .viewfinder-click-area:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* ========== Fullscreen Close Button ========== */
        .fullscreen-close {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-color);
            letter-spacing: 0.15em;
            cursor: pointer;
            padding: 0.5rem 0.75rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .fullscreen-close:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            background: rgba(255, 107, 139, 0.1);
        }

        /* ========== Fullscreen Mode ========== */
        .fullscreen-mode .blur-mask,
        .fullscreen-mode .clear-area-highlight,
        .fullscreen-mode .viewfinder-corners,
        .fullscreen-mode .viewfinder-crosshair,
        .fullscreen-mode .viewfinder-click-area,
        .fullscreen-mode .film-strip,
        .fullscreen-mode .side-text,
        .fullscreen-mode .video-preview,
        .fullscreen-mode .sidebar-controls,
        .fullscreen-mode footer {
            opacity: 0;
            pointer-events: none;
        }

        .fullscreen-mode .background-video {
            opacity: 1;
        }

        .fullscreen-mode .fullscreen-close {
            opacity: 1;
            pointer-events: auto;
        }

        /* ========== Fullscreen Navigation ========== */
        .fullscreen-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .fullscreen-nav-left {
            left: 20px;
            align-items: flex-start;
        }

        .fullscreen-nav-right {
            right: 20px;
            align-items: flex-end;
        }

        .fullscreen-mode .fullscreen-nav {
            opacity: 1;
            pointer-events: auto;
        }

        /* 按钮容器 */
        .fullscreen-nav-item {
            display: flex;
            flex-direction: column;
            align-items: inherit;
            gap: 0.25rem;
        }

        /* 参数标签 */
        .fullscreen-nav-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.6;
        }

        /* 主按钮 */
        .fullscreen-nav-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-color);
            letter-spacing: 0.15em;
            cursor: pointer;
            padding: 0.5rem 0.75rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .fullscreen-nav-btn:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            background: rgba(255, 107, 139, 0.1);
        }

        /* 时间码装饰 */
        .fullscreen-nav-timecode {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.5rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            opacity: 0.5;
        }

        /* 参数信息 */
        .fullscreen-nav-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.5rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            opacity: 0.5;
        }

        /* ========== Fullscreen Viewfinder Overlay ========== */
        .fullscreen-viewfinder {
            position: fixed;
            inset: 40px;
            z-index: 150;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .fullscreen-mode .fullscreen-viewfinder {
            opacity: 1;
        }

        /* 四个角落标记 */
        .fullscreen-corner {
            position: absolute;
            width: 60px;
            height: 60px;
            --corner-color: rgba(255, 255, 255, 0.4);
            --corner-width: 2px;
        }

        .fullscreen-corner::before,
        .fullscreen-corner::after {
            content: '';
            position: absolute;
            border-color: var(--corner-color);
            border-style: solid;
            border-width: 0;
        }

        .fullscreen-corner-tl { top: 0; left: 0; }
        .fullscreen-corner-tl::before { top: 0; left: 0; width: 60px; border-top-width: var(--corner-width); }
        .fullscreen-corner-tl::after { top: 0; left: 0; height: 60px; border-left-width: var(--corner-width); }

        .fullscreen-corner-tr { top: 0; right: 0; }
        .fullscreen-corner-tr::before { top: 0; right: 0; width: 60px; border-top-width: var(--corner-width); }
        .fullscreen-corner-tr::after { top: 0; right: 0; height: 60px; border-right-width: var(--corner-width); }

        .fullscreen-corner-bl { bottom: 0; left: 0; }
        .fullscreen-corner-bl::before { bottom: 0; left: 0; width: 60px; border-bottom-width: var(--corner-width); }
        .fullscreen-corner-bl::after { bottom: 0; left: 0; height: 60px; border-left-width: var(--corner-width); }

        .fullscreen-corner-br { bottom: 0; right: 0; }
        .fullscreen-corner-br::before { bottom: 0; right: 0; width: 60px; border-bottom-width: var(--corner-width); }
        .fullscreen-corner-br::after { bottom: 0; right: 0; height: 60px; border-right-width: var(--corner-width); }

        /* 直方图 */
        .fullscreen-histogram {
            position: fixed;
            bottom: 60px;
            right: 20px;
            width: 120px;
            height: 50px;
            z-index: 160;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .fullscreen-mode .fullscreen-histogram {
            opacity: 0.7;
        }

        .histogram-canvas {
            width: 100%;
            height: 100%;
        }

        /* 顶部参数条 */
        .fullscreen-top-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 160;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .fullscreen-mode .fullscreen-top-bar {
            opacity: 0.7;
        }

        .fullscreen-top-bar span {
            padding: 0.25rem 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
        }

        /* 全屏右下角文字说明 */
        .fullscreen-info {
            position: fixed;
            bottom: 60px;
            right: 20px;
            z-index: 160;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.25rem;
            opacity: 0;
            pointer-events: none;
        }

        .fullscreen-mode .fullscreen-info {
            opacity: 1;
        }

        .fullscreen-info-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 400;
            font-style: italic;
            color: var(--text-color);
            letter-spacing: 0.05em;
        }

        .fullscreen-info-desc {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.5rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            opacity: 0.7;
        }

        /* ========== Scroll Transition Curtains ========== */
        .scroll-curtain-left,
        .scroll-curtain-right {
            position: fixed;
            width: 50%;
            height: 100vh;
            top: 0;
            z-index: 10000;
            background-color: var(--bg-color);
            pointer-events: none;
            transform: translateY(-100%);
        }

        .scroll-curtain-left { left: 0; }
        .scroll-curtain-right { right: 0; }
    </style>
</head>

<body>

    <script>
        // Initialize GSAP animations
        document.addEventListener('DOMContentLoaded', () => {
            const curtainLeft = document.querySelector('.curtain-left');
            const curtainRight = document.querySelector('.curtain-right');
            const introScreen = document.getElementById('introScreen');
            const introTimecodeLeft = document.getElementById('introTimecodeLeft');
            const introTimecodeRight = document.getElementById('introTimecodeRight');
            const introTextLeft = document.getElementById('introTextLeft');
            const introTextRight = document.getElementById('introTextRight');

            // 生成开屏时间码
            function generateIntroTimecodes() {
                const count = 60;
                for (let i = 1; i <= count; i++) {
                    const spanL = document.createElement('span');
                    spanL.textContent = String(i).padStart(2, '0');
                    introTimecodeLeft.appendChild(spanL);

                    const spanR = document.createElement('span');
                    spanR.textContent = String(i).padStart(2, '0');
                    introTimecodeRight.appendChild(spanR);
                }
            }
            generateIntroTimecodes();

            // 设置初始位置
            gsap.set(introScreen, { opacity: 1 });
            gsap.set([introTextLeft, introTextRight], { opacity: 1 });

            // 开屏动画时间线（延迟 0.5 秒开始）
            const introTL = gsap.timeline({
                delay: 0.5
            });

            // 第一阶段：时间码瀑布降落（从屏幕最顶部外开始下落）
            introTL.fromTo([introTimecodeLeft, introTimecodeRight],
                { y: -window.innerHeight - 200 },
                { y: 0, duration: 2.5, ease: 'power3.out' }
            );

            // 第二阶段：文字滚筒翻转（直接衔接，无需等待）
            introTL.to(introTextLeft, {
                rotateX: 90,
                duration: 0.35,
                ease: 'power2.in',
                onComplete: () => {
                    introTextLeft.textContent = 'Ismael';
                }
            })
            .to(introTextLeft, {
                rotateX: 0,
                duration: 0.35,
                ease: 'power2.out'
            });

            introTL.to(introTextRight, {
                rotateX: 90,
                duration: 0.35,
                ease: 'power2.in',
                onComplete: () => {
                    introTextRight.textContent = 'Cruz Cordova';
                }
            }, '-=0.7')
            .to(introTextRight, {
                rotateX: 0,
                duration: 0.35,
                ease: 'power2.out'
            }, '-=0.35');

            // 第四阶段：黑色背景淡出 + 帷幕动画
            introTL.to(introScreen, {
                opacity: 0,
                duration: 0.5
            }, '-=0.2')
            .to(curtainLeft, {
                y: '100%',
                duration: 1.5,
                ease: 'expo.inOut'
            }, '<')
            .to(curtainRight, {
                y: '-100%',
                duration: 1.5,
                ease: 'expo.inOut'
            }, '<')
            .call(() => {
                introScreen.remove();
                curtainLeft.remove();
                curtainRight.remove();
            });

            const titleLeft = document.getElementById('titleLeft');
            const titleRight = document.getElementById('titleRight');
            const subtitleLeft = document.getElementById('subtitleLeft');
            const subtitleRight = document.getElementById('subtitleRight');
            const bgVideo = document.getElementById('bgVideo');

            // Video initialization
            function initVideo() {
                bgVideo.playbackRate = 0.8;
                bgVideo.addEventListener('loadeddata', () => {
                    bgVideo.play().catch(() => {});
                });
            }
            initVideo();

            // Generate timecode numbers on film strip
            function generateTimecodes() {
                const filmStrip = document.querySelector('.film-strip');
                const height = window.innerHeight;
                const spacing = 35; // 每个时间码间隔
                const count = Math.floor(height / spacing);

                // 清除现有时间码
                filmStrip.querySelectorAll('.timecode').forEach(el => el.remove());

                for (let i = 1; i <= count; i++) {
                    // 左侧时间码
                    const leftCode = document.createElement('span');
                    leftCode.className = 'timecode timecode-left';
                    leftCode.textContent = String(i).padStart(2, '0');
                    leftCode.style.top = `${i * spacing}px`;
                    filmStrip.appendChild(leftCode);

                    // 右侧时间码
                    const rightCode = document.createElement('span');
                    rightCode.className = 'timecode timecode-right';
                    rightCode.textContent = String(i).padStart(2, '0');
                    rightCode.style.top = `${i * spacing}px`;
                    filmStrip.appendChild(rightCode);
                }
            }
            generateTimecodes();

            // 窗口大小变化时重新生成
            window.addEventListener('resize', generateTimecodes);

            // Animate titles on load (延迟到开屏动画结束后)
            setTimeout(() => {
                titleLeft.classList.add('animate');
                titleRight.classList.add('animate');
                subtitleLeft.classList.add('animate');
                subtitleRight.classList.add('animate');
            }, 4500);

            // Title parallax effect on mouse move
            let mouseX = 0;
            let mouseY = 0;
            let targetX = 0;
            let targetY = 0;

            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - window.innerWidth / 2) / window.innerWidth * 5;
                mouseY = (e.clientY - window.innerHeight / 2) / window.innerHeight * 3;
            });

            function animateTitle() {
                targetX += (mouseX - targetX) * 0.1;
                targetY += (mouseY - targetY) * 0.1;

                titleLeft.style.transform = `translateY(0) translate(${-targetX}px, ${-targetY}px)`;
                titleRight.style.transform = `translateY(0) translate(${targetX}px, ${targetY}px)`;

                requestAnimationFrame(animateTitle);
            }
            animateTitle();

            // Theme toggle
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;

            themeToggle.addEventListener('click', () => {
                body.classList.toggle('light-theme');
                themeToggle.classList.toggle('active');

                const isLight = body.classList.contains('light-theme');
                themeToggle.innerHTML = isLight
                    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                       </svg>`
                    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                       </svg>`;
            });

            // View toggle (Slider/List)
            const toggleOptions = document.querySelectorAll('.toggle-option');
            toggleOptions.forEach(option => {
                option.addEventListener('click', () => {
                    toggleOptions.forEach(opt => opt.classList.remove('active'));
                    option.classList.add('active');
                });
            });

            // Filter tags
            const filterTags = document.querySelectorAll('.filter-tag');
            filterTags.forEach(tag => {
                tag.addEventListener('click', () => {
                    filterTags.forEach(t => t.classList.remove('active'));
                    tag.classList.add('active');
                });
            });

            // Update timecode
            function updateTimecode() {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                document.querySelector('.timecode').textContent = `${hours}:${minutes}:${seconds}`;
            }
            updateTimecode();
            setInterval(updateTimecode, 1000);

            // ========== Video Preview Interaction ==========
            const previewPrev = document.getElementById('previewPrev');
            const previewNext = document.getElementById('previewNext');
            const previewVideoPrev = document.getElementById('previewVideoPrev');
            const previewVideoNext = document.getElementById('previewVideoNext');

            // 视频列表（待填充视频源）
            const videoList = [
                'gugong.mp4',
                'gugong.mp4',
                'gugong.mp4',
                'gugong.mp4',
                'gugong.mp4',
                'gugong.mp4',
                'gugong.mp4',
                'gugong.mp4'
            ];
            let currentVideoIndex = 0;

            // 更新预览视频源
            function updatePreviewSources() {
                const prevIndex = (currentVideoIndex - 1 + videoList.length) % videoList.length;
                const nextIndex = (currentVideoIndex + 1) % videoList.length;

                if (videoList[prevIndex]) {
                    previewVideoPrev.src = videoList[prevIndex];
                    previewVideoPrev.load();
                }
                if (videoList[nextIndex]) {
                    previewVideoNext.src = videoList[nextIndex];
                    previewVideoNext.load();
                }
            }
            updatePreviewSources();

            // 视频加载后显示第一帧
            previewVideoPrev.addEventListener('loadeddata', () => {
                previewVideoPrev.currentTime = 0;
                previewVideoPrev.pause();
            });

            previewVideoNext.addEventListener('loadeddata', () => {
                previewVideoNext.currentTime = 0;
                previewVideoNext.pause();
            });

            // 鼠标悬停播放预览
            previewPrev.addEventListener('mouseenter', () => {
                if (previewVideoPrev.src) {
                    previewVideoPrev.play().catch(() => {});
                }
            });
            previewPrev.addEventListener('mouseleave', () => {
                previewVideoPrev.pause();
                previewVideoPrev.currentTime = 0;
            });

            previewNext.addEventListener('mouseenter', () => {
                if (previewVideoNext.src) {
                    previewVideoNext.play().catch(() => {});
                }
            });
            previewNext.addEventListener('mouseleave', () => {
                previewVideoNext.pause();
                previewVideoNext.currentTime = 0;
            });

            // 点击切换视频
            previewPrev.addEventListener('click', () => {
                const prevIndex = (currentVideoIndex - 1 + videoList.length) % videoList.length;
                if (videoList[prevIndex]) {
                    currentVideoIndex = prevIndex;
                    bgVideo.src = videoList[currentVideoIndex];
                    bgVideo.play().catch(() => {});
                    updatePreviewSources();
                    updateSideText();
                }
            });

            previewNext.addEventListener('click', () => {
                const nextIndex = (currentVideoIndex + 1) % videoList.length;
                if (videoList[nextIndex]) {
                    currentVideoIndex = nextIndex;
                    bgVideo.src = videoList[currentVideoIndex];
                    bgVideo.play().catch(() => {});
                    updatePreviewSources();
                    updateSideText();
                }
            });

            // ========== Viewfinder Fullscreen Interaction ==========
            const viewfinderClickArea = document.getElementById('viewfinderClickArea');
            const fullscreenClose = document.getElementById('fullscreenClose');

            // 取景器点击展开动画
            viewfinderClickArea.addEventListener('click', () => {
                const tl = gsap.timeline({
                    onComplete: () => {
                        body.classList.add('fullscreen-mode');
                    }
                });

                // 1. 取景器角落标记向外扩散消失
                tl.to(['.clear-area-highlight', '.viewfinder-corners'], {
                    scale: 3,
                    opacity: 0,
                    duration: 0.4,
                    ease: 'power2.in'
                });

                // 2. 中心准星扩散
                tl.to('.viewfinder-crosshair', {
                    scale: 2,
                    opacity: 0,
                    duration: 0.3,
                    ease: 'power2.in'
                }, '-=0.3');

                // 3. 模糊遮罩淡出
                tl.to('.blur-mask', {
                    opacity: 0,
                    duration: 0.4,
                    ease: 'power2.out'
                }, '-=0.2');

                // 4. 胶片条和侧边文字淡出
                tl.to(['.film-strip', '.side-text', '.video-preview', '.sidebar-controls', 'footer'], {
                    opacity: 0,
                    duration: 0.3,
                    ease: 'power2.out'
                }, '-=0.3');
            });

            // 关闭全屏
            function exitFullscreen() {
                body.classList.remove('fullscreen-mode');
                stopHistogramAnimation();

                // 重置元素状态
                gsap.set(['.clear-area-highlight', '.viewfinder-corners', '.viewfinder-crosshair'], {
                    scale: 1,
                    opacity: 1
                });
                gsap.set('.blur-mask', { opacity: 1 });
                gsap.set(['.film-strip', '.side-text', '.video-preview', '.sidebar-controls', 'footer'], { opacity: 1 });
            }

            fullscreenClose.addEventListener('click', exitFullscreen);

            // ESC 键退出
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && body.classList.contains('fullscreen-mode')) {
                    exitFullscreen();
                }
            });

            // ========== Fullscreen Navigation Buttons ==========
            const fullscreenPrev = document.getElementById('fullscreenPrev');
            const fullscreenNext = document.getElementById('fullscreenNext');

            fullscreenPrev.addEventListener('click', () => {
                const prevIndex = (currentVideoIndex - 1 + videoList.length) % videoList.length;
                if (videoList[prevIndex]) {
                    currentVideoIndex = prevIndex;
                    bgVideo.src = videoList[currentVideoIndex];
                    bgVideo.play().catch(() => {});
                    updateSideText();
                }
            });

            fullscreenNext.addEventListener('click', () => {
                const nextIndex = (currentVideoIndex + 1) % videoList.length;
                if (videoList[nextIndex]) {
                    currentVideoIndex = nextIndex;
                    bgVideo.src = videoList[currentVideoIndex];
                    bgVideo.play().catch(() => {});
                    updateSideText();
                }
            });

            // ========== Histogram Animation ==========
            let histogramAnimationId = null;
            let histogramTime = 0;

            function drawHistogram() {
                const canvas = document.getElementById('histogramCanvas');
                if (!canvas) return;

                const ctx = canvas.getContext('2d');
                canvas.width = 120;
                canvas.height = 50;

                ctx.clearRect(0, 0, 120, 50);

                // 绘制三条曲线（R/G/B 通道）
                const colors = ['#ff6b8b', '#6bff8b', '#6b8bff'];

                colors.forEach((color, idx) => {
                    ctx.beginPath();
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = 0.7;

                    for (let x = 0; x < 120; x++) {
                        // 使用时间变量创建动态效果
                        const timeOffset = histogramTime * 0.02;
                        const base = 20 + Math.sin((x * 0.05 + timeOffset + idx) * 2) * 8;
                        const noise = Math.sin((x + histogramTime + idx * 30) * 0.3) * 5;
                        const peak = x > 20 && x < 100 ? Math.sin((x - 20) * 0.05 + timeOffset) * 12 : 0;
                        const y = 50 - base - noise - peak - Math.random() * 3;

                        if (x === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                });

                histogramTime++;
                histogramAnimationId = requestAnimationFrame(drawHistogram);
            }

            function startHistogramAnimation() {
                if (histogramAnimationId) return;
                histogramTime = 0;
                drawHistogram();
            }

            function stopHistogramAnimation() {
                if (histogramAnimationId) {
                    cancelAnimationFrame(histogramAnimationId);
                    histogramAnimationId = null;
                }
            }

            // 全屏模式激活时启动动画
            viewfinderClickArea.addEventListener('click', () => {
                setTimeout(startHistogramAnimation, 500);
                // 右下角文字浮现动画
                setTimeout(() => {
                    updateFullscreenInfo();
                    gsap.fromTo('.fullscreen-info',
                        { opacity: 0, y: 20 },
                        { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' }
                    );
                }, 500);
            });

            // ========== Fullscreen Info ==========
            const fullscreenInfoTitle = document.getElementById('fullscreenInfoTitle');
            const fullscreenInfoDesc = document.getElementById('fullscreenInfoDesc');

            // 视频信息数据
            const videoInfo = [
                { title: '太和门', desc: 'Gate of Supreme Harmony' },
                { title: '太和殿', desc: 'Hall of Supreme Harmony' },
                { title: '乾清宫', desc: 'Palace of Heavenly Purity' },
                { title: '御花园', desc: 'Imperial Garden' },
                { title: '午门', desc: 'Meridian Gate' },
                { title: '太和门', desc: 'Gate of Supreme Harmony' },
                { title: '太和殿', desc: 'Hall of Supreme Harmony' },
                { title: '乾清宫', desc: 'Palace of Heavenly Purity' },
            ];

            // 更新全屏信息
            function updateFullscreenInfo() {
                const info = videoInfo[currentVideoIndex] || { title: '未知', desc: '' };
                fullscreenInfoTitle.textContent = info.title;
                fullscreenInfoDesc.textContent = info.desc;
            }

            // 更新右侧文字（带翻转动画）
            function updateSideText() {
                const info = videoInfo[currentVideoIndex] || { title: '', desc: '' };

                console.log('Updating side text:', info.title, 'at index:', currentVideoIndex);

                // 创建翻转动画时间线
                const tl = gsap.timeline();

                // 标题翻转
                tl.to(titleRight, {
                    rotateX: 90,
                    duration: 0.35,
                    ease: 'power2.in',
                    onComplete: () => {
                        titleRight.textContent = info.title;
                        console.log('Title updated to:', info.title);
                    }
                })
                .to(titleRight, {
                    rotateX: 0,
                    duration: 0.35,
                    ease: 'power2.out'
                });

                // 副标题同时翻转（使用不同的起始位置）
                tl.to(subtitleRight, {
                    rotateX: 90,
                    duration: 0.35,
                    ease: 'power2.in',
                    onComplete: () => {
                        subtitleRight.textContent = info.desc;
                    }
                }, 0.1)  // 延迟0.1秒开始
                .to(subtitleRight, {
                    rotateX: 0,
                    duration: 0.35,
                    ease: 'power2.out'
                }, 0.45);  // 在标题开始翻转回来后开始
            }
            updateSideText();

            // ========== Scroll Video Transition ==========
            const scrollCurtainLeft = document.querySelector('.scroll-curtain-left');
            const scrollCurtainRight = document.querySelector('.scroll-curtain-right');

            let scrollAccumulator = 0;
            const scrollThreshold = 150;
            let isTransitioning = false;
            let scrollTimeout = null;

            document.addEventListener('wheel', (e) => {
                // 仅主界面触发，全屏模式不响应
                if (isTransitioning || body.classList.contains('fullscreen-mode')) return;

                scrollAccumulator += Math.abs(e.deltaY);

                if (scrollTimeout) clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => { scrollAccumulator = 0; }, 500);

                if (scrollAccumulator >= scrollThreshold) {
                    triggerVideoTransition(e.deltaY > 0 ? 'next' : 'prev');
                    scrollAccumulator = 0;
                }
            }, { passive: true });

            function triggerVideoTransition(direction) {
                if (isTransitioning) return;
                isTransitioning = true;

                const nextIdx = direction === 'next'
                    ? (currentVideoIndex + 1) % videoList.length
                    : (currentVideoIndex - 1 + videoList.length) % videoList.length;

                if (!videoList[nextIdx]) {
                    isTransitioning = false;
                    return;
                }

                const tl = gsap.timeline({
                    onComplete: () => {
                        isTransitioning = false;
                        currentVideoIndex = nextIdx;
                        updatePreviewSources();
                        updateSideText();
                    }
                });

                // 第一阶段：帷幕从上方下降覆盖屏幕
                tl.to(scrollCurtainLeft, {
                    y: '0%',
                    duration: 0.8,
                    ease: 'expo.inOut'
                })
                .to(scrollCurtainRight, {
                    y: '0%',
                    duration: 0.8,
                    ease: 'expo.inOut'
                }, '<');

                // 第二阶段：切换视频
                tl.call(() => {
                    bgVideo.src = videoList[nextIdx];
                    bgVideo.play().catch(() => {});
                }, null, null, '+=0.1');

                // 第三阶段：帷幕分开（左向下，右向上）
                tl.to(scrollCurtainLeft, {
                    y: '100%',
                    duration: 1.5,
                    ease: 'expo.inOut'
                })
                .to(scrollCurtainRight, {
                    y: '-100%',
                    duration: 1.5,
                    ease: 'expo.inOut'
                }, '<')

                // 重置帷幕到屏幕上方外
                .set([scrollCurtainLeft, scrollCurtainRight], { y: '-100%' });
            }

        });
    </script>
</body>

</html>

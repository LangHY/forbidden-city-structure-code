<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .test-item {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            border-color: #c3e6cb;
        }
        .error {
            background: #f8d7da;
            border-color: #f5c6cb;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>页面诊断</h1>

        <div class="test-item success">
            <strong>✅ HTML文件加载成功</strong>
            <p>当前测试页面正常运行</p>
        </div>

        <div class="test-item" id="video-test">
            <strong>视频文件测试</strong>
            <p>正在测试视频文件加载...</p>
            <video id="testVideo" controls style="max-width: 100%; display: none;"></video>
        </div>

        <div class="test-item">
            <strong>iframe嵌入测试</strong>
            <p>尝试加载 opening.html：</p>
            <iframe src="/opening.html"></iframe>
        </div>
    </div>

    <script>
        // 测试视频加载
        const videoTest = document.getElementById('video-test');
        const testVideo = document.getElementById('testVideo');

        testVideo.src = '/gugong.mp4';
        testVideo.style.display = 'block';

        testVideo.addEventListener('loadeddata', () => {
            videoTest.classList.add('success');
            videoTest.innerHTML = '<strong>✅ 视频加载成功</strong><p>gugong.mp4 可以正常访问</p>';
            videoTest.appendChild(testVideo);
        });

        testVideo.addEventListener('error', () => {
            videoTest.classList.add('error');
            videoTest.innerHTML = '<strong>❌ 视频加载失败</strong><p>请检查视频文件路径</p>';
        });

        // 监听iframe加载错误
        const iframe = document.querySelector('iframe');
        iframe.addEventListener('error', () => {
            iframe.parentElement.innerHTML = '<strong style="color: red;">❌ iframe加载失败</strong>';
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匠心独具-故宫</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link/
        href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* 现代简约中国风 - 明亮清新 */
            --bg-color: #faf9f7;
            --accent-color: #1a1a1a;
            --primary-color: #b91c1c;
            --secondary-color: #78716c;
            --accent-glow: rgba(185, 28, 28, 0.1);
            --light-accent: #f5f5f4;
            --text-muted: #78716c;
            --gold-accent: #b91c1c;
            --dark-blue: #1e3a5f;
            --img-h: 70vh;
            --img-w: 50vh;
            --gap: 3vh;
        }

        body {
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Hide scrollbar but allow scrolling - higher specificity */
        html,
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        /* Ensure html also has no scrollbars */
        html {
            overflow: auto;
            scrollbar-width: none;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        /* Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 200;
            opacity: 0;
            transform: translateY(-100%);
            transition: all 0.4s ease;
            pointer-events: none;
        }

        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 5vw;
            background: transparent;
            backdrop-filter: none;
            border-bottom: none;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
        }

        .navbar-title {
            font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.25em;
            color: #1a1a1a;
            transition: all 0.3s ease;
        }

        .navbar-title:hover {
            color: #b91c1c;
        }

        .navbar-links {
            display: flex;
            gap: 1rem;
        }

        .navbar-link {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: rgba(26, 26, 26, 0.8);
            text-decoration: none;
            padding: 0.6rem 1.4rem;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .navbar-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(185, 28, 28, 0.1);
            transition: left 0.4s ease;
        }

        .navbar-link:hover {
            color: #fff;
            background: #b91c1c;
            border-color: #b91c1c;
            transform: translateY(-1px);
        }

        .navbar-link:hover::before {
            left: 100%;
        }

        .navbar.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .grain {
            position: fixed;
            inset: -50%;
            height: 200%;
            width: 200%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.04;
            pointer-events: none;
            z-index: 500;
            animation: noise 0.2s infinite;
        }

        @keyframes noise {
            0% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(-5%, -5%)
            }

            100% {
                transform: translate(5%, 5%)
            }
        }

        #white-mask {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.75);
            z-index: 3;
            opacity: 0;
            pointer-events: none;
            backdrop-filter: blur(2px);
        }

        .ui-layer {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 25vh;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .hero-title {
            /* Title moved to navbar */
            display: none;
        }

        .char {
            /* No longer used */
            display: none;
        }

        .waterfall-window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: var(--img-w);
            height: var(--img-h);
            overflow: hidden;
            z-index: 50;
        }

        .reel {
            display: flex;
            flex-direction: column;
            gap: var(--gap);
        }

        .reel img {
            width: var(--img-w);
            height: var(--img-h);
            object-fit: cover;
            filter: grayscale(1) brightness(0.8);
        }

        .flash {
            position: fixed;
            inset: 0;
            background: #fff;
            opacity: 0;
            z-index: 200;
            pointer-events: none;
        }

        #trigger-btn {
            position: fixed;
            bottom: 10vh;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            padding: 1rem 3rem;
            border: 1px solid rgba(26, 26, 26, 0.15);
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            cursor: pointer;
            background: transparent;
            color: #1a1a1a;
            transition: all 0.3s;
        }

        #trigger-btn:hover {
            background: #1a1a1a;
            color: #faf9f7;
            border-color: #1a1a1a;
        }

        /* 计数器精修：初始位置左上角 */
        .loader-info {
            position: fixed;
            top: 8vh;
            left: 5vw;
            z-index: 100;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            pointer-events: none;
        }

        #progress-num {
            font-size: 8rem;
            font-weight: 700;
            font-style: normal;
            line-height: 0.8;
            display: block;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.05em;
            opacity: 0.08;
            color: #1a1a1a;
            text-shadow: none;
        }

        .ai-panel {
            position: fixed;
            bottom: 5vh;
            right: 5vw;
            z-index: 150;
            opacity: 0;
            text-align: right;
        }

        #ai-btn {
            position: relative;
            padding: 12px 32px;
            border-radius: 50px;
            /* 玻璃态核心 */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            /* 液态光泽阴影 */
            box-shadow: 
                0 8px 32px 0 rgba(31, 38, 135, 0.07),
                inset 0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 2px 10px rgba(255, 255, 255, 0.3);
            
            color: #1a1a1a;
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 流动光效 */
        #ai-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(
                60deg,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            transform: translateX(-100%) skewX(-15deg);
            transition: 0.6s;
        }

        #ai-btn:hover {
            transform: translateY(-2px) scale(1.02);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 
                0 15px 35px rgba(185, 28, 28, 0.15),
                inset 0 0 20px rgba(255, 255, 255, 0.5);
            color: #b91c1c;
        }

        #ai-btn:hover::after {
            transform: translateX(100%) skewX(-15deg);
        }

        /* 按下效果 - 液态挤压感 */
        #ai-btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 
                0 5px 15px rgba(0, 0, 0, 0.05),
                inset 0 5px 10px rgba(0, 0, 0, 0.05);
        }

        /* ========== Scroll-Driven Video Frame Playback ========== */

        /* The canvas that replaces #final-bg as the background.
           It shows frame 0 during opening, then plays on scroll. */
        #frame-canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            opacity: 0;
            pointer-events: none;
        }

        .scroll-hint {
            position: fixed;
            bottom: 4vh;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            opacity: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            pointer-events: none;
        }

        .scroll-hint span {
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            opacity: 0.4;
            color: #1a1a1a;
        }

        .scroll-hint .arrow {
            width: 1px;
            height: 30px;
            background: rgba(26, 26, 26, 0.2);
            position: relative;
            overflow: hidden;
        }

        .scroll-hint .arrow::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            animation: scrollArrow 1.5s ease-in-out infinite;
        }

        @keyframes scrollArrow {
            0% {
                top: -100%;
            }

            50% {
                top: 100%;
            }

            100% {
                top: 100%;
            }
        }

        /* Tall scroll container that drives the frame playback */
        #scroll-driver {
            display: none;
            position: relative;
            width: 100%;
        }

        /* ========== Dashboard Section ========== */
        #dashboard-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: transparent;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
        }

        #dashboard-section.active {
            opacity: 1;
            pointer-events: auto;
        }

        .dashboard-sticky {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .dashboard-frame {
            width: 90vw;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        .dashboard-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 400px;
            background: url('https://images.unsplash.com/photo-1584450150050-4b9bdb5be8a1?auto=format&fit=crop&w=1200&q=80') center/cover;
            border-radius: 16px;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        
        .poker-cards-wrapper.splitting ~ .dashboard-bg,
        .poker-cards-wrapper.splitting + .dashboard-bg {
            opacity: 0;
        }

        /* ========== Poker Cards Wrapper - United State ========== */
        .poker-cards-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            perspective: 1200px;
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            z-index: 1;
        }

        /* Individual Poker Card - with flip capability */
        .poker-card-split {
            width: 280px;
            height: 400px;
            position: relative;
            display: flex;
            align-items: stretch;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
        }
        
        /* Card faces */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* Front face - shows big number */
        .card-front {
            background: linear-gradient(145deg, #faf9f7 0%, #f0eeeb 100%);
            border: 1px solid rgba(139, 0, 0, 0.15);
        }
        
        .card-big-num {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 10rem;
            color: #1a1a1a;
            opacity: 0.15;
            line-height: 1;
        }
        
        /* Back face - shows content */
        .card-back {
            background: linear-gradient(145deg, #faf9f7 0%, #f5f4f3 100%);
            border: 1px solid rgba(139, 0, 0, 0.15);
            transform: rotateY(180deg);
        }
        
        /* Flipped state */
        .poker-card-split.flipped {
            transform: rotateY(180deg);
        }
        
        /* United state - first and last card rounded corners */
        .poker-card-split:first-child .card-face {
            border-radius: 16px 0 0 16px;
        }
        
        .poker-card-split:nth-child(2) .card-face {
            border-radius: 0;
        }
        
        .poker-card-split:last-child .card-face {
            border-radius: 0 16px 16px 0;
        }
        
        .poker-cards-wrapper:not(.splitting) .poker-card-split .card-front {
            border-right: none;
        }

        /* Card corners */
        .card-corner {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            z-index: 2;
        }

        .card-corner.top-left {
            top: 16px;
            left: 16px;
        }

        .card-corner.bottom-right {
            bottom: 16px;
            right: 16px;
            transform: rotate(180deg);
        }

        .card-suit {
            font-size: 1.2rem;
            color: #8b0000;
        }

        .card-num {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.1rem;
            color: #1a1a1a;
            margin-top: 2px;
        }

        /* Card center content */
        .card-center-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .card-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.2rem;
            color: #1a1a1a;
            margin-bottom: 0.3rem;
            letter-spacing: 0.1em;
        }

        .card-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #78716c;
            opacity: 0.6;
            margin-bottom: 1rem;
        }

        .card-divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8b0000, transparent);
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        .card-desc {
            font-family: 'Noto Serif SC', serif;
            font-size: 0.75rem;
            line-height: 1.7;
            color: #78716c;
            opacity: 0.8;
            max-width: 200px;
        }

        /* Splitting state */
        .poker-cards-wrapper.splitting .poker-card-split .card-face {
            border-radius: 16px !important;
            border: 1px solid rgba(139, 0, 0, 0.15) !important;
        }

        /* ========== SPLIT STATE - Cards separate and float ========== */
        .poker-cards-wrapper.splitting {
            gap: 3rem;
        }

        .poker-cards-wrapper.splitting .poker-card-split {
            transform-style: preserve-3d;
            border-radius: 16px;
            border-right: 1px solid rgba(139, 0, 0, 0.15);
        }

        /* Card 1 - left */
        .poker-cards-wrapper.splitting #poker-card-1 {
            z-index: 5;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.9) inset;
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Card 2 - center */
        .poker-cards-wrapper.splitting #poker-card-2 {
            z-index: 10;
            box-shadow: 
                0 35px 70px rgba(139, 0, 0, 0.2),
                0 0 0 1px rgba(255, 255, 255, 0.95) inset;
            border-color: rgba(139, 0, 0, 0.3);
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Card 3 - right */
        .poker-cards-wrapper.splitting #poker-card-3 {
            z-index: 15;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.9) inset;
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Show all corners when splitting */
        .poker-cards-wrapper.splitting .poker-card-split .card-corner {
            display: flex !important;
        }

        .dash-column {
            flex: 1;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .dash-column[data-column="1"] {
            align-items: flex-start;
        }

        .dash-column[data-column="2"] {
            align-items: center;
        }

        .dash-column[data-column="3"] {
            align-items: flex-end;
        }

        /* Normal state: metric cards */
        .dash-column .metric-card {
            position: relative;
            width: 100%;
            background: rgba(250, 250, 249, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 8px;
            padding: 1.4rem;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .dash-column .metric-card .metric-label {
            font-family: 'Inter', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.4;
            margin-bottom: 0.6rem;
            color: #78716c;
        }

        .dash-column .metric-card .metric-value {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.6rem;
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 0.4rem;
            color: #1a1a1a;
        }

        .dash-column .metric-card .metric-desc {
            font-size: 0.72rem;
            line-height: 1.5;
            color: #78716c;
            opacity: 0.8;
            font-family: 'Noto Serif SC', serif;
        }

        .dash-column .chart-block-mini {
            background: rgba(250, 250, 249, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 8px;
            padding: 1rem;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .dash-column .chart-block-mini .chart-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            opacity: 0.35;
            margin-bottom: 0.8rem;
            color: #a89885;
        }

        .dash-column .status-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .dash-column .status-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .dash-column .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #f87171;
        }

        .dash-column .status-name {
            font-size: 0.65rem;
            opacity: 0.5;
            color: #78716c;
        }

        .dash-column .status-val {
            font-size: 0.6rem;
            font-variant-numeric: tabular-nums;
            opacity: 0.3;
            color: #78716c;
        }

        /* ========== POKER CARD SPLIT STATE ========== */
        .dashboard-content.splitting {
            gap: 3rem;
        }

        .dash-column.splitting {
            flex: 0 0 200px;
            max-width: 200px;
            transform: translateY(-20px);
        }

        .dash-column.splitting .metric-card {
            background: linear-gradient(145deg, #faf9f7 0%, #f0eeeb 100%);
            border: 2px solid rgba(139, 0, 0, 0.2);
            border-radius: 16px;
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.12),
                0 0 0 1px rgba(255, 255, 255, 0.9) inset;
            height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.2rem;
        }

        .dash-column.splitting .metric-card .metric-label {
            font-size: 0.5rem;
            opacity: 0.3;
            margin-bottom: 0.3rem;
        }

        .dash-column.splitting .metric-card .metric-value {
            font-size: 2rem;
            text-align: center;
            color: #8b0000;
            margin: auto 0;
        }

        .dash-column.splitting .metric-card .metric-desc {
            font-size: 0.65rem;
            text-align: center;
            opacity: 0.5;
        }

        /* Add card corners for splitting state */
        .dash-column.splitting .metric-card::before {
            content: attr(data-column);
            position: absolute;
            top: 12px;
            left: 12px;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1rem;
            color: #8b0000;
            opacity: 0.6;
        }

        .dash-column.splitting .metric-card::after {
            content: attr(data-column);
            position: absolute;
            bottom: 12px;
            right: 12px;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1rem;
            color: #8b0000;
            opacity: 0.6;
            transform: rotate(180deg);
        }

        .dash-column[data-column="1"].splitting .metric-card::before,
        .dash-column[data-column="1"].splitting .metric-card::after {
            content: '🏯';
        }

        .dash-column[data-column="2"].splitting .metric-card::before,
        .dash-column[data-column="2"].splitting .metric-card::after {

    <script>
        const API_KEY = "";
        const BASE_URL = "https://open.bigmodel.cn/api/paas/v4/chat/completions";

        const reel = document.getElementById('reel');
        const finalBg = document.getElementById('frame-canvas');
        const waterfallWindow = document.getElementById('window');
        const whiteMask = document.getElementById('white-mask');
        const progNum = document.getElementById('progress-num');
        const loaderBar = document.getElementById('loader-bar');
        const loaderTag = document.getElementById('loader-tag');
        const loader = document.getElementById('loader');
        const flash = document.getElementById('flash');

        async function getMuse() {
            // Default fallback if no API key
            if (API_KEY === "") return { quote: "红墙宫里万重门，太和殿上紫云深。" };
            try {
                const res = await fetch(BASE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "glm-4",
                        messages: [{ role: "system", content: "生成一句关于故宫或中国古建筑的唯美诗句，中文，20字以内。不要解析，直接返回JSON: {quote:'诗句内容'}" }]
                    })
                });
                const data = await res.json();
                return JSON.parse(data.choices[0].message.content.replace(/```json|```/g, ""));
            } catch (e) { return { quote: "琉璃瓦上凝宿雨，金水河畔映残阳。" }; }
        }

        async function typeWriter(text, element, speed = 100) {
            // Kill any running GSAP animations on this element to prevent conflicts
            gsap.killTweensOf(element);
            
            element.innerText = "";
            // Ensure opacity is set via GSAP to update its internal cache, 
            // otherwise previous tweens might cause issues
            gsap.set(element, { opacity: 1 });
            
            const chars = text.split("");
            for (let i = 0; i < chars.length; i++) {
                element.innerText += chars[i];
                // Randomize speed slightly for realism
                await new Promise(r => setTimeout(r, speed + Math.random() * 50));
            }
        }

        // Auto-start opening animation when page loads
        window.addEventListener('load', async () => {
            // Small delay to ensure all resources are loaded
            setTimeout(async () => {
                const tl = gsap.timeline();

                // 初始激活
                tl.to(progNum, { opacity: 0.8, duration: 1, ease: "power2.out" });
                tl.to(loaderBar, { scaleX: 1, duration: 4, ease: "power3.inOut" }, 0);

                const counter = { val: 0 };
                const imgH = waterfallWindow.offsetHeight;
                const gap = parseFloat(getComputedStyle(reel).gap);

                tl.to(counter, {
                    val: 100,
                    duration: 4,
                    ease: "expo.inOut",
                    onUpdate: () => {
                        const n = Math.floor(counter.val);
                        progNum.innerText = n.toString().padStart(2, '0');

                        const moveFactor = counter.val / 100;
                        const totalMoveY = window.innerHeight * 0.7;

                        gsap.set(loader, {
                            y: totalMoveY * moveFactor,
                            scaleY: 1 + (Math.sin(moveFactor * Math.PI) * 0.2)
                        });

                        gsap.set(progNum, {
                            skewX: -20 * Math.sin(moveFactor * Math.PI),
                            filter: `blur(${Math.sin(moveFactor * Math.PI) * 3}px)`,
                            opacity: 0.2 + (moveFactor * 0.6)
                        });

                        // Sync loader bar with frame loading progress
                        const combinedProgress = Math.max(n, frameLoadProgress);
                        gsap.set(loaderBar, { scaleX: combinedProgress / 100 });
                    }
                }, 0);

                tl.to(reel, {
                    y: -(imgH + gap) * 4,
                    duration: 4,
                    ease: "expo.inOut"
                }, 0);

                const burstTime = 3.8;

                // Remove the black block before flash
                const blackBlock = reel.lastElementChild;
                tl.call(() => {
                    if (blackBlock) {
                        blackBlock.style.display = 'none';
                    }
                }, null, burstTime - 0.1);

                tl.to(flash, { opacity: 1, duration: 0.1, yoyo: true, repeat: 1 }, burstTime);

                // Fade in the canvas (which shows video frame 0 = the seamless background)
                tl.to(finalBg, {
                    opacity: 1,
                    duration: 1.8,
                    ease: "power4.out",
                    onStart: () => {
                        // Ensure frame 0 is drawn before the canvas fades in
                        if (cachedFrames[0]) {
                            drawCachedFrame(0);
                        }
                    }
                }, burstTime);

                // Fade in the white mask slightly later for a layered effect
                tl.to(whiteMask, { opacity: 1, duration: 2.5, ease: "power2.out" }, burstTime + 0.5);

                // Fade out waterfall window without diffusion effect
                tl.to(waterfallWindow, {
                    opacity: 0,
                    duration: 1,
                    ease: "power2.in"
                }, burstTime);

                // 数字在最后炸开时消失
                tl.to(loader, {
                    opacity: 0,
                    scale: 0.8,
                    filter: "blur(20px)",
                    duration: 0.8
                }, burstTime);

                // Don't let await block the timeline construction
                getMuse().then(async (muse) => {
                    const el = document.getElementById('quote-text');
                    // Wait for container fade in (burstTime + 1.5s = approx 5.3s from start)
                    // We can just wait a bit or use a timeout matching the animation
                    await new Promise(r => setTimeout(r, (burstTime + 1.5) * 1000));
                    if (el) await typeWriter(muse.quote, el);
                });

                tl.to("#quote-container", { opacity: 1, y: 0, duration: 2.5 }, burstTime + 1.5);
                tl.to("#ai-panel", { opacity: 1, duration: 2 }, burstTime + 2);

                // Enable scroll video section after opening animation completes
                tl.call(() => {
                    enableScrollMode();
                }, null, burstTime + 4);

                window.addEventListener('mousemove', (e) => {
                    const x = (e.clientX / window.innerWidth - 0.5);
                    const y = (e.clientY / window.innerHeight - 0.5);
                    gsap.to(".ui-layer", { x: x * 80, y: y * 80, duration: 2.5 });
                });
            });
        });

        document.getElementById('ai-btn').addEventListener('click', async () => {
            const btn = document.getElementById('ai-btn');
            const el = document.getElementById('quote-text');
            btn.disabled = true; 
            
            // Fade out current text and wait for it to finish
            await gsap.to(el, { opacity: 0, duration: 0.5 });
            
            const muse = await getMuse();
            
            // Type new text
            await typeWriter(muse.quote, el);
            
            btn.disabled = false;
        });

        // ========== Scroll-Driven Video Frame-by-Frame Playback ==========
        // Strategy: pre-extract ALL frames from the video into offscreen canvases
        // during load. On scroll, just drawImage from the cached frame = instant & smooth.
        gsap.registerPlugin(ScrollTrigger);

        const frameCanvas = document.getElementById('frame-canvas');
        const frameCtx = frameCanvas.getContext('2d');
        const scrollDriver = document.getElementById('scroll-driver');
        const scrollHint = document.getElementById('scroll-hint');

        // --- Configuration ---
        const TARGET_FPS = 20;         // frames to extract per second of video
        let totalFrames = 0;
        let videoReady = false;
        let currentFrameIdx = 0;
        let frameLoadProgress = 0;     // 帧加载进度（用于同步加载条）

        // --- Video element (hidden, only used for extraction) ---
        const video = document.createElement('video');
        video.src = 'gugong.mp4';
        video.crossOrigin = 'anonymous';
        video.muted = true;
        video.playsInline = true;
        video.preload = 'metadata';

        // --- 降级方案：视频加载失败时显示静态图片 ---
        let isDegraded = false;
        let videoTimeoutId = null;

        function fallbackToStaticImage(reason) {
            if (isDegraded) return;
            isDegraded = true;
            
            console.warn(`[Video Fallback] ${reason}. Switching to static image.`);
            
            const staticBg = document.getElementById('final-bg');
            
            frameCanvas.style.display = 'none';
            
            if (staticBg) {
                staticBg.style.display = 'block';
                staticBg.style.cssText = `
                    position: fixed;
                    inset: 0;
                    width: 100vw;
                    height: 100vh;
                    object-fit: cover;
                    z-index: 2;
                    opacity: 0;
                `;
                
                gsap.to(staticBg, {
                    opacity: 1,
                    duration: 1.8,
                    ease: "power4.out"
                });
            }
            
            videoReady = false;
        }

        // --- 视频加载超时检测（10秒）---
        videoTimeoutId = setTimeout(() => {
            if (!videoReady && !isDegraded) {
                fallbackToStaticImage('Video loading timeout (10s)');
            }
        }, 10000);

        // --- 视频错误事件监听 ---
        video.addEventListener('error', (e) => {
            clearTimeout(videoTimeoutId);
            
            const errorTypes = {
                1: 'MEDIA_ERR_ABORTED - 用户终止加载',
                2: 'MEDIA_ERR_NETWORK - 网络错误',
                3: 'MEDIA_ERR_DECODE - 解码错误',
                4: 'MEDIA_ERR_SRC_NOT_SUPPORTED - 不支持的格式'
            };
            
            const errorInfo = video.error 
                ? errorTypes[video.error.code] || `未知错误 (${video.error.code})`
                : '未知错误';
            
            fallbackToStaticImage(`Video error: ${errorInfo}`);
        });

        // ============================================================
        // OffscreenCanvas 性能优化检测
        // 
        // OffscreenCanvas 允许在 Worker 线程中进行 Canvas 绘制，
        // 避免阻塞主线程，提升渲染性能。
        // 
        // 核心优势：
        // 1. 异步绘制 - 不阻塞主线程的 UI 交互
        // 2. ImageBitmap 优化 - transferToImageBitmap() 创建可复用的位图
        // 3. 内存效率 - ImageBitmap 可以被多个 Canvas 共享
        // 
        // 降级策略：
        // - 支持 OffscreenCanvas：使用 ImageBitmap 缓存
        // - 不支持：使用传统 Canvas 缓存
        // ============================================================
        const supportsOffscreenCanvas = typeof OffscreenCanvas !== 'undefined';
        const supportsImageBitmap = typeof createImageBitmap === 'function';
        
        console.log(`[Performance] OffscreenCanvas: ${supportsOffscreenCanvas ? '✓ Supported' : '✗ Not supported'}`);
        console.log(`[Performance] ImageBitmap: ${supportsImageBitmap ? '✓ Supported' : '✗ Not supported'}`);

        // ============================================================
        // FrameLRUCache: 帧的 LRU 缓存管理器
        // 
        // 核心思想：
        // 1. LRU (Least Recently Used) 算法 - 自动淘汰最久未使用的帧
        // 2. 保护机制 - 当前播放位置 ±20% 范围内的帧不会被释放
        // 3. 内存控制 - 限制缓存帧数上限，防止内存溢出
        // 4. 统计功能 - 记录缓存命中率，便于性能分析
        // 
        // 为什么使用 LRU？
        // - 视频帧数据占用大量内存（每帧可能是几百KB到几MB）
        // - 用户通常只在某个区间内来回滚动，不需要缓存所有帧
        // - LRU 能智能保留"热点"帧，淘汰"冷门"帧
        // ============================================================
        class FrameLRUCache {
            constructor(maxSize = 60) {
                this.maxSize = maxSize;
                this.cache = new Map();
                this.accessOrder = [];
                
                this.hits = 0;
                this.misses = 0;
                this.currentPlayPosition = 0;
                this.protectRange = 0.2;
            }

            get(frameIndex) {
                if (this.cache.has(frameIndex)) {
                    this.hits++;
                    this._updateAccessOrder(frameIndex);
                    return this.cache.get(frameIndex);
                }
                this.misses++;
                return null;
            }

            set(frameIndex, canvas) {
                if (this.cache.has(frameIndex)) {
                    this.cache.set(frameIndex, canvas);
                    this._updateAccessOrder(frameIndex);
                    return;
                }

                if (this.cache.size >= this.maxSize) {
                    this._evict();
                }

                this.cache.set(frameIndex, canvas);
                this.accessOrder.push(frameIndex);
            }

            release(frameIndex) {
                if (!this.cache.has(frameIndex)) return false;

                const canvas = this.cache.get(frameIndex);
                this._disposeCanvas(canvas);
                
                this.cache.delete(frameIndex);
                const orderIdx = this.accessOrder.indexOf(frameIndex);
                if (orderIdx > -1) {
                    this.accessOrder.splice(orderIdx, 1);
                }
                
                return true;
            }

            _updateAccessOrder(frameIndex) {
                const idx = this.accessOrder.indexOf(frameIndex);
                if (idx > -1) {
                    this.accessOrder.splice(idx, 1);
                    this.accessOrder.push(frameIndex);
                }
            }

            _disposeCanvas(frameData) {
                if (!frameData) return;
                
                if (frameData.type === 'bitmap' && frameData.data) {
                    if (typeof frameData.data.close === 'function') {
                        frameData.data.close();
                    }
                } else if (frameData.type === 'canvas' && frameData.data) {
                    const canvas = frameData.data;
                    const ctx = canvas.getContext('2d');
                    if (ctx) {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                    canvas.width = 0;
                    canvas.height = 0;
                } else if (frameData.type === 'offscreen' && frameData.data) {
                    const offscreen = frameData.data;
                    offscreen.width = 0;
                    offscreen.height = 0;
                }
            }

            _isInProtectRange(frameIndex, totalFrames) {
                if (totalFrames <= 0) return false;
                
                const protectStart = Math.floor(this.currentPlayPosition * totalFrames * (1 - this.protectRange));
                const protectEnd = Math.ceil(this.currentPlayPosition * totalFrames * (1 + this.protectRange));
                
                return frameIndex >= protectStart && frameIndex <= protectEnd;
            }

            _evict() {
                const totalFrames = this.accessOrder.length > 0 ? 
                    Math.max(...this.accessOrder) + 1 : 0;

                for (let i = 0; i < this.accessOrder.length; i++) {
                    const oldestIdx = this.accessOrder[i];
                    
                    if (!this._isInProtectRange(oldestIdx, totalFrames)) {
                        this.release(oldestIdx);
                        return true;
                    }
                }

                if (this.accessOrder.length > 0) {
                    const oldestIdx = this.accessOrder[0];
                    this.release(oldestIdx);
                    return true;
                }

                return false;
            }

            setCurrentPosition(progress, totalFrames) {
                this.currentPlayPosition = progress;
                this._totalFrames = totalFrames;
            }

            getStats() {
                const total = this.hits + this.misses;
                return {
                    size: this.cache.size,
                    maxSize: this.maxSize,
                    hits: this.hits,
                    misses: this.misses,
                    hitRate: total > 0 ? (this.hits / total * 100).toFixed(2) + '%' : '0%',
                    protectedRange: `${Math.round(this.protectRange * 200)}%`
                };
            }

            clear() {
                for (const [idx, canvas] of this.cache) {
                    this._disposeCanvas(canvas);
                }
                this.cache.clear();
                this.accessOrder = [];
                this.hits = 0;
                this.misses = 0;
            }

            has(frameIndex) {
                return this.cache.has(frameIndex);
            }

            get size() {
                return this.cache.size;
            }
        }

        // ============================================================
        // FrameLoader: 渐进式帧加载器
        // 
        // 核心思想：
        // 1. 关键帧优先 - 先加载每秒1帧，确保视频可立即播放
        // 2. 按需加载 - 用户滚动时优先加载当前播放位置附近的帧
        // 3. 空闲后台提取 - 使用 requestIdleCallback 在浏览器空闲时提取剩余帧
        // 4. 保持原始分辨率 - 不做任何画质损失
        // 5. LRU 缓存管理 - 自动释放不活跃的帧，控制内存使用
        // 
        // 反向播放逻辑：
        // idx=0 对应视频最后一帧（时间 t=duration）
        // idx=max 对应视频第一帧（时间 t=0）
        // ============================================================
        class FrameLoader {
            static STATE = {
                IDLE: 'idle',
                LOADING: 'loading',
                READY: 'ready',
                ERROR: 'error'
            };

            constructor(videoElement, options = {}) {
                this.video = videoElement;
                this.targetFps = options.targetFps || 20;
                this.keyFrameInterval = options.keyFrameInterval || 1;
                this.maxCacheSize = options.maxCacheSize || 60;

                this.state = FrameLoader.STATE.IDLE;
                this.frameCache = new FrameLRUCache(this.maxCacheSize);
                this.totalFrames = 0;
                this.duration = 0;
                this.videoWidth = 0;
                this.videoHeight = 0;

                this.keyFramesLoaded = false;
                this.allFramesLoaded = false;
                this.pendingFrameRequests = new Map();
                this.idleCallbackId = null;
                this.isExtractingIdle = false;
                this.lastRequestedIdx = -1;
                this._loadedFrameIndices = new Set();

                this.onProgress = options.onProgress || (() => {});
                this.onFrameReady = options.onFrameReady || (() => {});
                this.onError = options.onError || (() => {});
                this.onKeyFramesReady = options.onKeyFramesReady || (() => {});
                this.onAllFramesReady = options.onAllFramesReady || (() => {});
            }

            async init() {
                this.state = FrameLoader.STATE.LOADING;

                return new Promise((resolve, reject) => {
                    const onMetadata = () => {
                        this.duration = this.video.duration;
                        this.totalFrames = Math.floor(this.duration * this.targetFps);
                        this.videoWidth = this.video.videoWidth;
                        this.videoHeight = this.video.videoHeight;

                        this.onProgress({ phase: 'metadata', totalFrames: this.totalFrames });
                        resolve();
                    };

                    const onError = (e) => {
                        this.state = FrameLoader.STATE.ERROR;
                        this.onError(e);
                        reject(e);
                    };

                    this.video.addEventListener('loadedmetadata', onMetadata, { once: true });
                    this.video.addEventListener('error', onError, { once: true });
                });
            }

            async loadKeyFrames() {
                const keyFrameCount = Math.ceil(this.duration / this.keyFrameInterval);
                const keyFrameIndices = [];

                for (let i = 0; i < keyFrameCount; i++) {
                    const t = i * this.keyFrameInterval;
                    const idx = this.timeToFrameIndex(t);
                    if (idx >= 0 && idx < this.totalFrames) {
                        keyFrameIndices.push(idx);
                    }
                }

                this.onProgress({ phase: 'keyframes', current: 0, total: keyFrameIndices.length });

                for (let i = 0; i < keyFrameIndices.length; i++) {
                    const idx = keyFrameIndices[i];
                    await this.extractFrame(idx);
                    this.onProgress({ 
                        phase: 'keyframes', 
                        current: i + 1, 
                        total: keyFrameIndices.length 
                    });
                }

                this.keyFramesLoaded = true;
                this.onKeyFramesReady();
            }

            timeToFrameIndex(time) {
                const normalIdx = Math.floor(time * this.targetFps);
                return this.totalFrames - 1 - normalIdx;
            }

            frameIndexToTime(idx) {
                const normalIdx = this.totalFrames - 1 - idx;
                return normalIdx / this.targetFps;
            }

            async extractFrame(idx) {
                const cachedFrame = this.frameCache.get(idx);
                if (cachedFrame) {
                    return cachedFrame;
                }

                if (this.pendingFrameRequests.has(idx)) {
                    return this.pendingFrameRequests.get(idx);
                }

                const promise = new Promise(async (resolve) => {
                    const time = this.frameIndexToTime(idx);
                    const clampedTime = Math.max(0, Math.min(time, this.duration - 0.01));

                    const onSeeked = async () => {
                        let frameData = null;

                        if (supportsOffscreenCanvas) {
                            const offscreen = new OffscreenCanvas(this.videoWidth, this.videoHeight);
                            const ctx = offscreen.getContext('2d');
                            ctx.drawImage(this.video, 0, 0);

                            if (supportsImageBitmap) {
                                try {
                                    const bitmap = await offscreen.transferToImageBitmap();
                                    frameData = { type: 'bitmap', data: bitmap, width: this.videoWidth, height: this.videoHeight };
                                } catch (e) {
                                    console.warn(`[FrameLoader] ImageBitmap creation failed for frame ${idx}, falling back to canvas:`, e);
                                    frameData = { type: 'canvas', data: offscreen, width: this.videoWidth, height: this.videoHeight };
                                }
                            } else {
                                frameData = { type: 'offscreen', data: offscreen, width: this.videoWidth, height: this.videoHeight };
                            }
                        } else {
                            const canvas = document.createElement('canvas');
                            canvas.width = this.videoWidth;
                            canvas.height = this.videoHeight;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(this.video, 0, 0);
                            frameData = { type: 'canvas', data: canvas, width: this.videoWidth, height: this.videoHeight };
                        }

                        this.frameCache.set(idx, frameData);
                        this._loadedFrameIndices.add(idx);
                        this.pendingFrameRequests.delete(idx);
                        this.onFrameReady(idx, frameData);
                        resolve(frameData);
                    };

                    this.video.addEventListener('seeked', onSeeked, { once: true });
                    this.video.currentTime = clampedTime;
                });

                this.pendingFrameRequests.set(idx, promise);
                return promise;
            }

            getFrame(idx) {
                if (idx < 0 || idx >= this.totalFrames) return null;
                return this.frameCache.get(idx);
            }

            hasFrame(idx) {
                return idx >= 0 && idx < this.totalFrames && this.frameCache.has(idx);
            }

            async requestFrame(idx, progress = 0) {
                this.lastRequestedIdx = idx;
                
                if (progress > 0) {
                    this.frameCache.setCurrentPosition(progress, this.totalFrames);
                }

                if (this.hasFrame(idx)) {
                    return this.frameCache.get(idx);
                }

                return this.extractFrame(idx);
            }

            async requestNearbyFrames(centerIdx, range = 5) {
                const start = Math.max(0, centerIdx - range);
                const end = Math.min(this.totalFrames - 1, centerIdx + range);

                const promises = [];
                for (let i = start; i <= end; i++) {
                    if (!this.hasFrame(i)) {
                        promises.push(this.extractFrame(i));
                    }
                }

                if (promises.length > 0) {
                    await Promise.all(promises);
                }
            }

            startIdleExtraction() {
                if (this.isExtractingIdle) return;

                this.isExtractingIdle = true;
                this.scheduleIdleExtraction();
            }

            scheduleIdleExtraction() {
                if (!this.isExtractingIdle || this.allFramesLoaded) return;

                if (typeof requestIdleCallback !== 'undefined') {
                    this.idleCallbackId = requestIdleCallback(async (deadline) => {
                        await this.processIdleTime(deadline);
                    }, { timeout: 100 });
                } else {
                    setTimeout(async () => {
                        await this.extractNextMissingFrame();
                        this.scheduleIdleExtraction();
                    }, 16);
                }
            }

            async processIdleTime(deadline) {
                while (deadline.timeRemaining() > 4 && !this.allFramesLoaded) {
                    const hasMore = await this.extractNextMissingFrame();
                    if (!hasMore) break;
                }

                if (!this.allFramesLoaded) {
                    this.scheduleIdleExtraction();
                }
            }

            async extractNextMissingFrame() {
                const missingIdx = this.findNextMissingFrame();
                if (missingIdx === -1) {
                    this.allFramesLoaded = true;
                    this.state = FrameLoader.STATE.READY;
                    this.onAllFramesReady();
                    return false;
                }

                await this.extractFrame(missingIdx);
                this.onProgress({ 
                    phase: 'idle', 
                    current: this._loadedFrameIndices.size,
                    total: this.totalFrames 
                });
                return true;
            }

            findNextMissingFrame() {
                if (this.lastRequestedIdx >= 0) {
                    for (let offset = 1; offset < this.totalFrames; offset++) {
                        const before = this.lastRequestedIdx - offset;
                        const after = this.lastRequestedIdx + offset;

                        if (before >= 0 && !this.frameCache.has(before)) return before;
                        if (after < this.totalFrames && !this.frameCache.has(after)) return after;
                    }
                }

                for (let i = 0; i < this.totalFrames; i++) {
                    if (!this.frameCache.has(i)) return i;
                }
                return -1;
            }

            stopIdleExtraction() {
                this.isExtractingIdle = false;
                if (this.idleCallbackId && typeof cancelIdleCallback !== 'undefined') {
                    cancelIdleCallback(this.idleCallbackId);
                    this.idleCallbackId = null;
                }
            }

            getLoadingProgress() {
                const loaded = this._loadedFrameIndices.size;
                return {
                    loaded,
                    total: this.totalFrames,
                    percentage: (loaded / this.totalFrames) * 100,
                    keyFramesLoaded: this.keyFramesLoaded,
                    allFramesLoaded: this.allFramesLoaded,
                    cacheStats: this.frameCache.getStats()
                };
            }

            getCacheStats() {
                return this.frameCache.getStats();
            }
        }

        // 创建 FrameLoader 实例
        const frameLoader = new FrameLoader(video, {
            targetFps: TARGET_FPS,
            keyFrameInterval: 1,
            onProgress: (info) => {
                console.log('[FrameLoader] Progress:', info);
                
                if (info.phase === 'keyframes') {
                    const pct = Math.round((info.current / info.total) * 100);
                    loaderTag.innerText = `LOADING KEYFRAMES ${pct}%`;
                    frameLoadProgress = pct;
                } else if (info.phase === 'idle') {
                    const pct = Math.round((info.current / info.total) * 100);
                    loaderTag.innerText = `FRAMES ${pct}%`;
                    frameLoadProgress = pct;
                }
            },
            onFrameReady: (idx, canvas) => {
                if (idx === 0) {
                    drawCachedFrame(0);
                }
            },
            onKeyFramesReady: () => {
                console.log('[FrameLoader] Key frames ready!');
                loaderTag.innerText = "KEYFRAMES READY";
                frameLoadProgress = 100;
                videoReady = true;
                clearTimeout(videoTimeoutId);
                frameLoader.startIdleExtraction();
            },
            onAllFramesReady: () => {
                console.log('[FrameLoader] All frames loaded!');
                loaderTag.innerText = "READY";
                frameLoadProgress = 100;
            },
            onError: (e) => {
                console.error('[FrameLoader] Error:', e);
                fallbackToStaticImage('FrameLoader error');
            }
        });

        // 兼容性：cachedFrames 提供对 frameLoader.frameCache 的代理访问
        const cachedFrames = new Proxy({}, {
            get(target, prop) {
                const idx = parseInt(prop);
                if (!isNaN(idx)) {
                    return frameLoader.frameCache.get(idx);
                }
                return target[prop];
            },
            has(target, prop) {
                const idx = parseInt(prop);
                if (!isNaN(idx)) {
                    return frameLoader.frameCache.has(idx);
                }
                return false;
            }
        });

        // Resize display canvas to viewport
        function resizeCanvas() {
            frameCanvas.width = window.innerWidth;
            frameCanvas.height = window.innerHeight;
            // Redraw current frame at new size
            if (videoReady && frameLoader.hasFrame(currentFrameIdx)) {
                drawCachedFrame(currentFrameIdx);
            }
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Draw a cached frame onto the display canvas with cover-fit
        // 
        // 性能优化说明：
        // 1. ImageBitmap：使用 transferFromImageBitmap() 或 drawImage()，性能最优
        // 2. OffscreenCanvas：使用 drawImage() 绘制
        // 3. 传统 Canvas：使用 drawImage() 绘制（降级方案）
        // 
        // Cover-fit 算法：保持宽高比，填充整个视口，居中裁剪
        function drawCachedFrame(idx) {
            const frameData = frameLoader.getFrame(idx);
            if (!frameData) return;
            currentFrameIdx = idx;

            const cW = frameCanvas.width;
            const cH = frameCanvas.height;
            const srcWidth = frameData.width;
            const srcHeight = frameData.height;

            const sRatio = srcWidth / srcHeight;
            const cRatio = cW / cH;
            let dw, dh, dx, dy;
            if (cRatio > sRatio) {
                dw = cW; dh = cW / sRatio;
                dx = 0; dy = (cH - dh) / 2;
            } else {
                dh = cH; dw = cH * sRatio;
                dy = 0; dx = (cW - dw) / 2;
            }

            if (frameData.type === 'bitmap') {
                const bitmap = frameData.data;
                
                if ('transferFromImageBitmap' in frameCtx) {
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = srcWidth;
                    tempCanvas.height = srcHeight;
                    const tempCtx = tempCanvas.getContext('bitmaprenderer');
                    tempCtx.transferFromImageBitmap(bitmap);
                    frameCtx.drawImage(tempCanvas, dx, dy, dw, dh);
                } else {
                    frameCtx.drawImage(bitmap, dx, dy, dw, dh);
                }
            } else {
                const src = frameData.data;
                frameCtx.drawImage(src, dx, dy, dw, dh);
            }
        }

        // --- 初始化 FrameLoader ---
        async function initFrameLoader() {
            try {
                await frameLoader.init();
                totalFrames = frameLoader.totalFrames;
                await frameLoader.loadKeyFrames();
            } catch (e) {
                console.error('[FrameLoader] Init failed:', e);
                fallbackToStaticImage('FrameLoader init failed');
            }
        }

        initFrameLoader();

        const dashSection = document.getElementById('dashboard-section');
        const dashFrame = document.getElementById('dashboard-frame');
        const destinationPage = document.getElementById('destination-page');

        // Get navbar element
        const navbar = document.getElementById('navbar');

        // Function to enable scroll mode after opening animation
        function enableScrollMode() {
            // Body becomes scrollable
            document.body.style.overflow = 'auto';
            document.body.style.height = 'auto';

            // Show all sections
            scrollDriver.style.display = 'block';
            scrollDriver.style.height = '600vh';
            // dashSection.style.display = 'block'; // Removed, let GSAP handle or CSS
            destinationPage.style.display = 'flex';

            // Fade in scroll hint
            gsap.to(scrollHint, { opacity: 1, duration: 1.5, delay: 0.5 });

            // Hide scroll hint on scroll
            let hintHidden = false;
            let ticking = false;

            window.addEventListener('scroll', () => {
                if (!ticking) {
                    window.requestAnimationFrame(() => {
                        if (!hintHidden && window.scrollY > 80) {
                            hintHidden = true;
                            gsap.to(scrollHint, { opacity: 0, duration: 0.5 });
                        }
                        ticking = false;
                    });
                    ticking = true;
                }
            }, { passive: true });

            // --- 0. White mask fade out ---
            // Use a timeline for smoother interpolation instead of manual calculation
            gsap.to(whiteMask, {
                opacity: 0,
                ease: "power2.inOut",
                scrollTrigger: {
                    trigger: scrollDriver,
                    start: "top top",
                    end: "25% top", // Extend the fade-out duration to 25% of the scroll height
                    scrub: 1.5,     // Smoother scrubbing with inertia
                }
            });

            // --- 1. Video frame scrubbing ---
            ScrollTrigger.create({
                trigger: scrollDriver,
                start: 'top top',
                end: 'bottom bottom',
                scrub: 0.15,
                onUpdate: (self) => {
                    // 降级模式下跳过视频帧绘制，但继续执行其他动画
                    if (!videoReady && !isDegraded) return;
                    
                    const p = self.progress;

                    // 仅在视频就绪时绘制帧
                    if (videoReady && !isDegraded) {
                        const idx = Math.min(totalFrames - 1, Math.floor(p * totalFrames));
                        
                        // 按需加载：如果当前帧不存在，异步加载并绘制
                        // 传递 progress 参数以更新 LRU 缓存的保护范围
                        if (!frameLoader.hasFrame(idx)) {
                            frameLoader.requestFrame(idx, p).then(() => {
                                drawCachedFrame(idx);
                            });
                            // 同时预加载附近的帧
                            frameLoader.requestNearbyFrames(idx, 3);
                        } else {
                            // 更新当前播放位置，用于 LRU 保护范围计算
                            frameLoader.frameCache.setCurrentPosition(p, totalFrames);
                            drawCachedFrame(idx);
                        }
                    }

                    // Fade out opening UI in first 25%
                    if (p < 0.25) {
                        const fadeP = p / 0.25;
                        gsap.set('.ui-layer', { opacity: 1 - fadeP });
                        gsap.set('#ai-panel', { opacity: 1 - fadeP });
                        gsap.set('.grain', { opacity: 0.04 * (1 - fadeP) });
                    } else {
                        gsap.set('.ui-layer', { opacity: 0 });
                        gsap.set('#ai-panel', { opacity: 0 });
                        gsap.set('.grain', { opacity: 0 });
                    }
                }
            });

            // --- Dashboard: appears near end of video, fixed at center ---
            
            // Elements
            const pokerCardsWrapper = document.getElementById('poker-cards-wrapper');
            const pokerCards = document.querySelectorAll('.poker-card-split');
            
            // Initially hide cards
            gsap.set(pokerCardsWrapper, { opacity: 0, y: 100, scale: 0.9 });
            
            // Dashboard fade in/out - symmetric for both scroll directions
            ScrollTrigger.create({
                trigger: scrollDriver,
                start: "bottom 150%", // Trigger when bottom of scrollDriver is 150% down (about 50vh before the end)
                end: "bottom 100%",   // End when bottom of scrollDriver hits bottom of viewport
                scrub: 1,
                onUpdate: (self) => {
                    const p = self.progress;
                    
                    // Fade in dashboard section
                    dashSection.style.opacity = p;
                    
                    // Add blur to background when dashboard appears
                    // 降级模式下对静态图片应用模糊效果
                    if (isDegraded) {
                        const staticBg = document.getElementById('final-bg');
                        if (staticBg) {
                            gsap.set(staticBg, { filter: `blur(${p * 8}px)`, force3D: true });
                        }
                    } else {
                        gsap.set(frameCanvas, { filter: `blur(${p * 8}px)`, force3D: true });
                    }
                    
                    if (p > 0.1) {
                        dashSection.classList.add('active');
                    } else {
                        dashSection.classList.remove('active');
                    }
                    
                    // Animate cards
                    gsap.set(pokerCardsWrapper, { 
                        opacity: p, 
                        y: 100 * (1 - p), 
                        scale: 0.9 + p * 0.1,
                        force3D: true
                    });
                }
            });
            
            // Cards split animation - symmetric for both directions
            ScrollTrigger.create({
                trigger: destinationPage,
                start: "top bottom",
                end: "center center",
                scrub: 1,
                onUpdate: (self) => {
                    const p = self.progress;
                    const wH = window.innerHeight;
                    
                    // Fine-tuned animation phases for elegance and fluidity
                    
                    let splitX = 0, descendY = 0, cardRotateZ = 0, cardRotateY = 0, cardScale = 1;
                    
                    // Use a unified easing function for seamless transitions
                    const easeInOutCubic = x => x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
                    const easeOutCubic = x => 1 - Math.pow(1 - x, 3);
                    const easeInCubic = x => x * x * x;
                    
                    if (p < 0.2) {
                        // Phase 1: Gentle initial split (0 - 0.2)
                        const localP = p / 0.2;
                        const easeP = easeOutCubic(localP);
                        
                        splitX = 140 * easeP;
                        cardScale = 1 - (easeP * 0.05);
                        pokerCardsWrapper.classList.add('splitting');
                        
                    } else if (p < 0.45) {
                        // Phase 2: Dynamic converge with subtle 3D tilt (0.2 - 0.45)
                        const localP = (p - 0.2) / 0.25;
                        const easeP = easeInOutCubic(localP);
                        
                        splitX = 140 * (1 - easeP);
                        descendY = easeP * wH * 0.08;
                        
                        // Graceful arc-like rotation during converge
                        cardRotateZ = Math.sin(localP * Math.PI) * 12;
                        // Slight depth tilt
                        cardRotateY = Math.sin(localP * Math.PI) * 15;
                        
                        cardScale = 0.95 - Math.sin(localP * Math.PI) * 0.05;
                        
                    } else if (p < 0.7) {
                        // Phase 3: Majestic 180 flip while slightly descending (0.45 - 0.7)
                        const localP = (p - 0.45) / 0.25;
                        const easeP = easeInOutCubic(localP);
                        
                        splitX = 0;
                        descendY = wH * 0.08 + (easeP * wH * 0.05);
                        
                        cardRotateZ = 0;
                        // Smooth 180 degree flip
                        cardRotateY = 180 * easeP;
                        
                        // Push slightly back in 3D space during flip for realism
                        cardScale = 0.9 - Math.sin(localP * Math.PI) * 0.1;
                        
                        if (localP > 0.5) {
                            pokerCards.forEach(card => card.classList.add('flipped'));
                        } else {
                            pokerCards.forEach(card => card.classList.remove('flipped'));
                        }
                        
                    } else {
                        // Phase 4: Elegant fan out and land exactly at center (0.7 - 1.0)
                        const localP = (p - 0.7) / 0.3;
                        const easeP = easeInOutCubic(localP);
                        
                        splitX = 0;
                        // The wrapper moves down 100vh total, so we don't need extra Y descent here
                        // Just ease back to 0 so it lands perfectly centered in the wrapper
                        descendY = (wH * 0.13) * (1 - easeP);
                        
                        cardRotateZ = 0;
                        cardRotateY = 180;
                        
                        // Scale back up to normal
                        cardScale = 0.9 + (easeP * 0.1);
                    }
                    
                    // Apply computed transforms with individual card variations
                    pokerCards.forEach((card, i) => {
                        const dir = i - 1; // -1 (left), 0 (center), 1 (right)
                        
                        let finalX = dir * splitX;
                        let finalY = descendY;
                        let finalRotateZ = cardRotateZ;
                        let finalRotateY = cardRotateY;
                        
                        // Apply Fan effect during the final phase
                        if (p >= 0.7) {
                            const fanP = (p - 0.7) / 0.3;
                            const easeFan = easeOutCubic(fanP);
                            
                            // Fan out sideways
                            const spreadDist = 70 * easeFan;
                            finalX = dir * spreadDist;
                            
                            // Fan rotation
                            const fanAngle = 12 * easeFan;
                            finalRotateZ = dir * fanAngle;
                            
                            // Shift rotation origin to bottom center for true fan effect
                            gsap.set(card, { transformOrigin: "bottom center" });
                            
                            // Subtle Y offset so cards overlap nicely at bottom, fan at top
                            finalY = descendY + Math.abs(dir) * 15 * easeFan;
                        } else {
                            gsap.set(card, { transformOrigin: "center center" });
                        }
                        
                        // Add slight staggered depth rotation during flip based on position
                        if (p >= 0.45 && p < 0.7) {
                            const flipP = (p - 0.45) / 0.25;
                            finalRotateY += dir * Math.sin(flipP * Math.PI) * 15;
                        }
                        
                        gsap.set(card, {
                            x: finalX,
                            y: finalY,
                            rotationZ: finalRotateZ,
                            rotationY: finalRotateY + dir * (p < 0.45 ? Math.sin(p * Math.PI * 4) * 8 : 0),
                            scale: cardScale,
                            zIndex: i === 1 ? 10 : i + 5,
                            force3D: true
                        });
                    });
                    
                    // Wrapper follows
                    // Use eased translation so it lands exactly at the center of destination page (100vh down)
                    const wrapperEase = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
                    gsap.set(pokerCardsWrapper, { y: wrapperEase * wH, force3D: true });
                    
                    // Toggle splitting class based on phase
                    if (p > 0.1 && p < 0.7) {
                        pokerCardsWrapper.classList.add('splitting');
                    } else {
                        pokerCardsWrapper.classList.remove('splitting');
                    }
                    
                    // Show destination page
                    if (p > 0.5) {
                        destinationPage.classList.add('visible');
                    } else {
                        destinationPage.classList.remove('visible');
                    }
                    gsap.set('.destination-container', { 
                        opacity: Math.max(0, (p - 0.4) / 0.6), 
                        y: 20 * (1 - p),
                        force3D: true 
                    });
                },
                onEnter: () => pokerCardsWrapper.classList.add('landed'),
                onLeaveBack: () => {
                    pokerCardsWrapper.classList.remove('landed');
                    pokerCards.forEach(card => card.classList.remove('flipped'));
                }
            });

            setTimeout(() => ScrollTrigger.refresh(), 100);
        }
    </script>
</body>
